name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

# Releases must never be cancelled mid-publish: a half-published set of
# interdependent packages is worse than a delayed one.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Version PR or publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write # push the version commit + tags
      pull-requests: write # open the "Version Packages" PR
      # OIDC. This is what replaces NPM_TOKEN — npm mints a short-lived
      # publish token from this workflow's identity. No secret is stored.
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # changesets diffs against baseBranch; a shallow clone breaks that.
          fetch-depth: 0

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          # Trusted publishing needs Node >=22.14 and npm >=11.5.1.
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # A bad release is unrecoverable — npm forbids re-publishing a version.
      # Gate on the full suite before anything reaches the registry.
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
