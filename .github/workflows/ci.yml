name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter:
    name: Flutter analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.4
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  android:
    name: Android lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.4
          channel: stable
          cache: true

      - run: flutter pub get

      # Ensure Flutter's Gradle glue (local.properties, .flutter-plugins) exists.
      - run: flutter build apk --debug --config-only

      - name: Gradle lint
        working-directory: android
        run: ./gradlew lint

      - name: Assemble debug
        working-directory: android
        run: ./gradlew assembleDebug
